<!doctype html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Traceworks Console • Billing</title><link rel="stylesheet" href="/traceworks-shell.css" /></head><body class="tw-shell-body"><div class="tw-shell"><aside class="tw-nav"><div class="tw-logo">Trace<span>works</span> Console</div><a href="/console.html">Dashboard</a><a href="/cases.html">Cases</a><a href="/search.html">Search</a><a href="/reports.html">Reports</a><a href="/sources.html">Sources</a><a href="/workflows.html">Workflows</a><a class="active" href="/billing.html">Billing</a><a href="/admin.html">Admin</a></aside><main class="tw-main"><section class="tw-top"><h1>Billing + Monetization</h1></section><section class="tw-kpis" id="billing-kpis"><article class="tw-card"><div class="tw-label">Total Orders</div><div class="tw-value" id="kpi-total">—</div></article><article class="tw-card"><div class="tw-label">Completed</div><div class="tw-value" id="kpi-completed">—</div></article><article class="tw-card"><div class="tw-label">Queue Depth</div><div class="tw-value" id="kpi-queue">—</div></article><article class="tw-card"><div class="tw-label">Failed</div><div class="tw-value" id="kpi-failed">—</div></article></section><article class="tw-card" style="margin-top:16px"><p class="tw-label">Metrics are loaded from <code>/api/admin-metrics</code>. Enter your ADMIN_API_KEY to load live data.</p><div style="display:flex;gap:8px;margin-top:8px"><input id="billing-key" type="password" placeholder="ADMIN_API_KEY" style="flex:1;padding:8px;background:#0d1523;border:1px solid #22324c;color:#e7edf8;border-radius:6px;font-size:13px;" /><button id="billing-load" style="padding:8px 14px;background:#1a2a4a;border:1px solid #2b4070;color:#e7edf8;border-radius:6px;cursor:pointer;font-size:13px;">Load</button></div><p id="billing-status" style="font-size:12px;color:#8099c2;margin-top:8px;"></p></article></main></div><script>document.getElementById('billing-load').addEventListener('click',async()=>{const k=document.getElementById('billing-key').value.trim();const s=document.getElementById('billing-status');if(!k){s.textContent='Enter ADMIN_API_KEY first.';return;}s.textContent='Loading…';try{const r=await fetch('/api/admin-metrics',{headers:{Authorization:'Bearer '+k}});const d=await r.json();if(!r.ok){s.textContent=d.error||'Error loading metrics.';return;}const m=d.metrics||{};document.getElementById('kpi-total').textContent=m.ordersTotal??'—';document.getElementById('kpi-completed').textContent=m.byStatus?.completed??'—';document.getElementById('kpi-queue').textContent=m.queueDepth??'—';document.getElementById('kpi-failed').textContent=m.byStatus?.failed??'—';s.textContent='Loaded from live store.';}catch{s.textContent='Cannot reach /api/admin-metrics.';}});</script></body></html>
