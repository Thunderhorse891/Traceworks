<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraceWorks™ — No Connection</title>
    <meta name="description" content="TraceWorks is offline. Return when your connection is available to submit or track investigations." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#09090f" />
    <link rel="canonical" href="/offline.html" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <script src="/error-handler.js" defer></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="topbar">
        <h1>Trace<span>Works™</span></h1>
      </div>
    </header>

    <div class="admin-page" style="max-width:560px; text-align:center;">
      <span class="eyebrow">Connection Unavailable</span>
      <h1 style="margin-bottom:12px;">You're offline</h1>
      <p style="color:var(--text-2); font-size:15px; margin-bottom:32px;">
        TraceWorks requires a live connection to submit requests and track reports.<br />
        Any previously loaded pages are available below.
      </p>

      <div style="display:flex; flex-direction:column; gap:12px; align-items:center; margin-bottom:40px;">
        <button id="retryConnectionBtn" class="btn-primary" style="width:220px;">Try Again</button>
        <a href="/" class="btn-outline" style="width:220px; text-align:center;">Go to Home</a>
      </div>

      <div style="border-top:1px solid var(--border); padding-top:24px;">
        <p style="font-size:12px; color:var(--text-4); letter-spacing:.05em; text-transform:uppercase; margin-bottom:12px;">Cached pages available offline</p>
        <nav style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">
          <a href="/terms.html" style="font-size:12px; color:var(--text-3);">Terms of Service</a>
          <a href="/privacy.html" style="font-size:12px; color:var(--text-3);">Privacy Policy</a>
          <a href="/refund-policy.html" style="font-size:12px; color:var(--text-3);">Refund Policy</a>
          <a href="/packages.html" style="font-size:12px; color:var(--text-3);">Packages</a>
        </nav>
      </div>
    </div>

    <script src="/pwa.js" type="module"></script>
    <script src="/offline.js" type="module"></script>
  </body>
</html>
