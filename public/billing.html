<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traceworks Console • Billing</title>
  <link rel="stylesheet" href="/traceworks-shell.css" />
</head>
<body class="tw-shell-body" data-page="billing">
  <div class="tw-shell">
    <aside class="tw-nav">
      <div class="tw-logo">Trace<span>works</span> Console</div>
      <a href="/console.html">Dashboard</a>
      <a href="/cases.html">Matters</a>
      <a href="/reports.html">Reports</a>
      <a href="/sources.html">Sources</a>
      <a href="/workflows.html">Workflows</a>
      <a class="active" href="/billing.html">Billing</a>
      <a href="/admin-dashboard.html">Admin Dashboard</a>
    </aside>
    <main class="tw-main">
      <section class="tw-top">
        <h1>Billing + Monetization</h1>
        <div class="tw-chip ok">live api</div>
      </section>

      <div id="auth-banner"></div>

      <section class="tw-kpis">
        <article class="tw-card">
          <div class="tw-label">Top package</div>
          <div id="billing-top-package" class="tw-value">—</div>
        </article>
        <article class="tw-card">
          <div class="tw-label">Conversion</div>
          <div id="billing-conversion" class="tw-value">n/a</div>
        </article>
        <article class="tw-card">
          <div class="tw-label">Revenue total</div>
          <div id="billing-revenue" class="tw-value">$0.00</div>
        </article>
        <article class="tw-card">
          <div class="tw-label">Enterprise batch</div>
          <div id="billing-enterprise" class="tw-value">0</div>
        </article>
      </section>

      <article class="tw-card">
        <h2 class="tw-section-title">Recent paid activity</h2>
        <div class="tw-label" style="margin-bottom:10px;">Queue depth: <span id="billing-queue-depth">0</span></div>
        <table class="tw-table">
          <thead>
            <tr>
              <th>Case Ref</th>
              <th>Package</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="billing-orders-body"></tbody>
        </table>
      </article>
    </main>
  </div>

  <script type="module" src="/traceworks-shell.js"></script>
</body>
</html>
