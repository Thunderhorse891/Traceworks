<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Deep background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060c14"/>
      <stop offset="100%" stop-color="#0b1420"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c9a84c"/>
      <stop offset="60%"  stop-color="#f5d87a"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="textGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f5d87a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#8fa3c8" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Right-side decorative element (signal bars) -->
  <g opacity="0.12">
    <rect x="980" y="200" width="160" height="1" fill="#c9a84c"/>
    <rect x="980" y="230" width="120" height="1" fill="#c9a84c"/>
    <rect x="980" y="260" width="80"  height="1" fill="#c9a84c"/>
    <rect x="980" y="290" width="140" height="1" fill="#c9a84c"/>
    <rect x="980" y="320" width="60"  height="1" fill="#c9a84c"/>
    <rect x="980" y="350" width="100" height="1" fill="#c9a84c"/>
    <rect x="980" y="380" width="180" height="1" fill="#c9a84c"/>
    <rect x="980" y="410" width="90"  height="1" fill="#c9a84c"/>
  </g>

  <!-- Gold top accent bar -->
  <rect width="1200" height="5" fill="url(#goldLine)"/>

  <!-- Left accent bar -->
  <rect x="80" y="100" width="3" height="430" fill="#c9a84c" opacity="0.6"/>

  <!-- Brand mark (TW) top-left -->
  <rect x="80" y="60" width="36" height="36" rx="4" fill="#09090f" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
  <text x="98" y="84" font-family="Georgia,'Times New Roman',serif" font-size="20" font-weight="700" fill="#c9a84c" text-anchor="middle">TW</text>

  <!-- Main heading -->
  <text x="130" y="240"
    font-family="Georgia,'Times New Roman',serif"
    font-size="76"
    font-weight="700"
    fill="url(#textGold)"
    letter-spacing="-1">TraceWorks™</text>

  <!-- Tagline -->
  <text x="134" y="300"
    font-family="Arial,'Helvetica Neue',sans-serif"
    font-size="26"
    font-weight="400"
    fill="#8fa3c8"
    letter-spacing="1">Investigative Property Reports</text>

  <!-- Description -->
  <text x="134" y="358"
    font-family="Arial,'Helvetica Neue',sans-serif"
    font-size="18"
    fill="#5a6e8f"
    letter-spacing="0.3">Evidence-grade public-record OSINT for legal professionals, attorneys &amp; title researchers.</text>

  <!-- Divider line -->
  <rect x="130" y="390" width="500" height="1" fill="#1e2d45"/>

  <!-- Feature chips row -->
  <g font-family="'Courier New',Courier,monospace" font-size="13" letter-spacing="0.5">
    <!-- Chip 1 -->
    <rect x="130" y="410" width="170" height="30" rx="15" fill="#0d1728" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
    <text x="215" y="430" fill="#c9a84c" text-anchor="middle">County CAD + TX SOS</text>

    <!-- Chip 2 -->
    <rect x="312" y="410" width="160" height="30" rx="15" fill="#0d1728" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
    <text x="392" y="430" fill="#c9a84c" text-anchor="middle">Confidence-Labeled</text>

    <!-- Chip 3 -->
    <rect x="484" y="410" width="150" height="30" rx="15" fill="#0d1728" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
    <text x="559" y="430" fill="#c9a84c" text-anchor="middle">Source Trace Panel</text>
  </g>

  <!-- Stats block -->
  <g fill="#3d4f70" font-family="'Courier New',Courier,monospace" font-size="12" letter-spacing="0.5">
    <text x="134" y="490">5+ COUNTIES</text>
    <text x="240" y="490" fill="#1e2d45">·</text>
    <text x="254" y="490">7 WORKFLOW STEPS</text>
    <text x="398" y="490" fill="#1e2d45">·</text>
    <text x="412" y="490">100% CITED OR FLAGGED</text>
    <text x="610" y="490" fill="#1e2d45">·</text>
    <text x="624" y="490">&lt;45 MIN DELIVERY</text>
  </g>

  <!-- URL / domain hint -->
  <text x="134" y="560"
    font-family="'Courier New',Courier,monospace"
    font-size="14"
    fill="#2e3f5c"
    letter-spacing="1">traceworks.example.com</text>

  <!-- Gold bottom accent bar -->
  <rect y="625" width="1200" height="5" fill="#c9a84c" opacity="0.4"/>
</svg>
