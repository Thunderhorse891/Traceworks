  <!-- W letter -->
  <line x1="18" y1="8" x2="20.5" y2="23" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20.5" y1="23" x2="23" y2="15" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23" y1="15" x2="25.5" y2="23" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="25.5" y1="23" x2="28" y2="8" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
