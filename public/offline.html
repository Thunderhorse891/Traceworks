<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraceWorks™ — Offline</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container" style="max-width:640px; padding-top:80px; text-align:center;">
      <h1 style="font-family:Georgia,serif; font-size:clamp(32px,5vw,56px); color:#f3f6ff;">Trace<span style="color:#d8b34c;">Works™</span></h1>
      <p style="color:#d8b34c; letter-spacing:.15em; font-size:12px; text-transform:uppercase; margin-bottom:32px;">Connection Unavailable</p>
      <p style="color:#95a3c5; font-size:18px; max-width:480px; margin:0 auto 24px;">You appear to be offline. TraceWorks requires a live internet connection to submit and track investigative report requests.</p>
      <p style="color:#667496; font-size:14px;">Please check your connection and reload the page.</p>
      <button onclick="window.location.reload()" style="margin-top:32px; padding:14px 32px; font-size:15px;">Try Again</button>
    </main>
  </body>
</html>
