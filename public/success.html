<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraceWorks™ — Payment Complete</title>
    <meta name="theme-color" content="#07090f" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="topbar">
        <h1>Trace<span>Works™</span></h1>
      </div>
    </header>
    <main class="container" style="max-width:760px; padding-top:56px; padding-bottom:56px;">
      <div class="form-wrap">
        <p style="color:var(--gold-mid); font-size:11px; letter-spacing:.18em; text-transform:uppercase; margin-bottom:12px;">Payment Confirmed</p>
        <h2 style="font-family:var(--font-serif); font-size:clamp(24px,3.5vw,38px); color:var(--text-primary); margin-bottom:12px;">Your case is in the queue.</h2>
        <p style="color:var(--text-secondary); font-size:15px; margin-bottom:24px;">Research begins automatically. Report will be emailed to you when complete — typically 10–45 minutes.</p>
        <p id="status" style="margin-bottom:16px;">Loading order status…</p>
        <ul id="details" style="list-style:none; padding:0; display:flex; flex-direction:column; gap:8px; margin-bottom:24px;"></ul>
        <a href="/" class="btn-outline" style="display:inline-block;">Back to Home</a>
      </div>
    </main>

    <script>
      const p = new URLSearchParams(location.search);
      const caseRef = p.get('case_ref');
      const email = p.get('email');
      const statusToken = p.get('status_token') || p.get('statusToken');
      const statusEl = document.getElementById('status');
      const detailsEl = document.getElementById('details');

      // Terminal states — stop polling once we reach these
      const TERMINAL_STATES = new Set(['completed', 'failed']);
      let pollInterval = null;

      function row(label, value) {
        const li = document.createElement('li');
        li.textContent = `${label}: ${value || 'n/a'}`;
        return li;
      }

      function renderOrder(data) {
        detailsEl.innerHTML = '';
        detailsEl.appendChild(row('Case', data.caseRef));
        detailsEl.appendChild(row('Package', data.packageName || data.packageId));
        detailsEl.appendChild(row('Status', data.status));
        detailsEl.appendChild(row('Fulfillment attempts', data.fulfillmentAttempts));
        if (data.queuedAt) detailsEl.appendChild(row('Queued at', new Date(data.queuedAt).toLocaleString()));
        if (data.lastAttemptAt) detailsEl.appendChild(row('Last attempt', new Date(data.lastAttemptAt).toLocaleString()));
        if (data.retryAt) detailsEl.appendChild(row('Next retry', new Date(data.retryAt).toLocaleString()));
        if (data.completedAt) detailsEl.appendChild(row('Completed at', new Date(data.completedAt).toLocaleString()));
      }

      async function load() {
        if (!caseRef || (!statusToken && !email)) {
          statusEl.textContent = 'Missing case reference or status token. Please contact support with your payment receipt.';
          clearInterval(pollInterval);
          return;
        }

        try {
          const authParam = statusToken
            ? `statusToken=${encodeURIComponent(statusToken)}`
            : `email=${encodeURIComponent(email)}`;
          const res = await fetch(`/api/get-order?caseRef=${encodeURIComponent(caseRef)}&${authParam}`);
          const data = await res.json().catch(() => ({}));

          if (res.ok) {
            if (data.status === 'completed') {
              statusEl.textContent = `Case ${data.caseRef} is complete. Report delivery should be in your inbox.`;
              clearInterval(pollInterval);
            } else if (data.status === 'failed') {
              statusEl.textContent = `Case ${data.caseRef} encountered an issue. Our team will review and contact you.`;
              clearInterval(pollInterval);
            } else if (data.status === 'retrying') {
              statusEl.textContent = `Case ${data.caseRef} is scheduled for automatic retry.`;
            } else if (data.status === 'processing') {
              statusEl.textContent = `Case ${data.caseRef} is actively processing now.`;
            } else {
              statusEl.textContent = `Case ${data.caseRef} is ${data.status}. Typical turnaround is 10–45 minutes.`;
            }
            renderOrder(data);
            return;
          }

          if (res.status === 404) {
            statusEl.textContent = 'Order status not visible yet. Refresh in 30–60 seconds.';
            return;
          }

          statusEl.textContent = data.error || 'Unable to load status right now.';
        } catch {
          statusEl.textContent = 'Status service temporarily unavailable. Your order is still being processed.';
        }
      }

      load();
      pollInterval = setInterval(load, 20000);
    </script>
  </body>
</html>
