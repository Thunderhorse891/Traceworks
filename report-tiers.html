<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraceWorks™ Checkout Canceled</title>
    <link rel="stylesheet" href="/styles.css" />
    <!-- Progressive Web App manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ffffff" />
  </head>
  <body>
    <main class="container form-wrap" style="margin-top:24px; max-width:760px;">
      <h1>Checkout canceled</h1>
      <p>No charge was made. You can return to the home page and submit your order again when ready.</p>
      <p><a href="/">Back to home</a></p>
    </main>
    <script>
      // Register the service worker for offline support when available.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
