<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traceworks Console • Matters</title>
  <link rel="stylesheet" href="/traceworks-shell.css" />
</head>
<body class="tw-shell-body" data-page="cases">
  <div class="tw-shell">
    <aside class="tw-nav">
      <div class="tw-logo">Trace<span>works</span> Console</div>
      <a href="/console.html">Dashboard</a>
      <a class="active" href="/cases.html">Matters</a>
      <a href="/reports.html">Reports</a>
      <a href="/sources.html">Sources</a>
      <a href="/workflows.html">Workflows</a>
      <a href="/billing.html">Billing</a>
      <a href="/admin-dashboard.html">Admin Dashboard</a>
    </aside>
    <main class="tw-main">
      <section class="tw-top">
        <h1>Matters</h1>
        <div class="tw-chip ok">live orders</div>
      </section>

      <div id="auth-banner"></div>

      <section class="tw-case-layout">
        <article class="tw-card">
          <h2 class="tw-section-title">Matter Registry</h2>
          <table class="tw-table">
            <thead>
              <tr>
                <th>Case Ref</th>
                <th>Subject</th>
                <th>Package</th>
                <th>Status</th>
                <th>Location</th>
                <th>Customer</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="case-table-body"></tbody>
          </table>
        </article>

        <article id="case-detail" class="tw-card"></article>
      </section>
    </main>
  </div>

  <script type="module" src="/traceworks-shell.js"></script>
</body>
</html>
